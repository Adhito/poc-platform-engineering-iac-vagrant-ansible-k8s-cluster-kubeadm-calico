---
- name: Extract ArgoCD initial admin password
  ansible.builtin.shell: >
    kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret
    -o jsonpath='{.data.password}' | base64 --decode
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  register: argocd_password
  changed_when: false

- name: Ensure configs directory exists
  ansible.builtin.file:
    path: "{{ configs_path }}"
    state: directory
    mode: '0755'

- name: Write ArgoCD admin password to shared configs location
  ansible.builtin.copy:
    content: "{{ argocd_password.stdout }}\n"
    dest: "{{ configs_path }}/credentials_argocd_admin_password"
    mode: '0600'

- name: Display ArgoCD access information
  ansible.builtin.debug:
    msg:
      - "ArgoCD password saved to: {{ configs_path }}/credentials_argocd_admin_password"
      - "Access ArgoCD at: https://localhost:30002"
      - "Username: admin"
      - "Password: {{ argocd_password.stdout }}"
