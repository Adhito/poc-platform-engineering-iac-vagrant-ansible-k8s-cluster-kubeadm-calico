---
- name: Create .kube directory for vagrant user
  ansible.builtin.file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0700'

- name: Copy kubeconfig from shared location for vagrant user
  ansible.builtin.copy:
    src: "{{ configs_path }}/config"
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0600'
