---
- name: Wait for metrics-server to be ready
  ansible.builtin.command: kubectl get pods -A -l k8s-app=metrics-server --field-selector=status.phase=Running
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  register: metrics_server_pods
  until: metrics_server_pods.rc == 0 and metrics_server_pods.stdout != ""
  retries: 30
  delay: 10
  changed_when: false

- name: Create kubernetes-dashboard namespace
  ansible.builtin.command: kubectl create namespace {{ dashboard_namespace }}
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when: ns_result.rc != 0 and 'AlreadyExists' not in ns_result.stderr

- name: Apply dashboard admin ServiceAccount
  ansible.builtin.command: >
    kubectl apply -f /vagrant/ansible/roles/addon_dashboard/files/dashboard-admin-sa.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  changed_when: true

- name: Apply dashboard admin Secret
  ansible.builtin.command: >
    kubectl apply -f /vagrant/ansible/roles/addon_dashboard/files/dashboard-admin-secret.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  changed_when: true

- name: Apply dashboard admin ClusterRoleBinding
  ansible.builtin.command: >
    kubectl apply -f /vagrant/ansible/roles/addon_dashboard/files/dashboard-admin-crb.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  changed_when: true

- name: Apply Kubernetes Dashboard main manifest
  ansible.builtin.command: >
    kubectl apply -f /vagrant/script-manifest/utility-dashboard/kubernetes-ui-dashboard-main.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  changed_when: true

- name: Apply Kubernetes Dashboard components manifest
  ansible.builtin.command: >
    kubectl apply -f /vagrant/script-manifest/utility-dashboard/kubernetes-ui-dashboard-components.yaml
  environment:
    KUBECONFIG: /home/vagrant/.kube/config
  become: true
  become_user: vagrant
  changed_when: true

- ansible.builtin.import_tasks: extract_token.yaml
