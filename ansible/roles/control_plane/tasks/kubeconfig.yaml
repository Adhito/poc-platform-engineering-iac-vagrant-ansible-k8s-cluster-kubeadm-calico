---
- name: Create .kube directory for root user
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Copy admin.conf to root .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: '0600'

- name: Create .kube directory for vagrant user
  ansible.builtin.file:
    path: /home/vagrant/.kube
    state: directory
    owner: vagrant
    group: vagrant
    mode: '0700'

- name: Copy admin.conf to vagrant user .kube/config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/vagrant/.kube/config
    remote_src: true
    owner: vagrant
    group: vagrant
    mode: '0600'

- name: Ensure configs directory exists on shared mount
  ansible.builtin.file:
    path: "{{ configs_path }}"
    state: directory
    mode: '0755'

- name: Copy kubeconfig to shared configs location for host access
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ configs_path }}/config"
    remote_src: true
    mode: '0600'
